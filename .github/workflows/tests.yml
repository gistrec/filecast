name: Tests

on:
  push:
    branches: [master, develop, tests]
  pull_request:
    branches: [master, develop, tests]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    defaults:
      run:
        shell: ${{ matrix.os == 'windows-latest' && 'msys2 {0}' || 'bash' }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up MSYS2 (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: mingw-w64-x86_64-gcc mingw-w64-x86_64-cmake mingw-w64-x86_64-ninja mingw-w64-x86_64-gtest

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtest-dev cmake

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install googletest

      - name: Configure
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            cmake -S . -B build -G Ninja
          else
            cmake -S . -B build
          fi

      - name: Build
        run: cmake --build build --config Release

      - name: Run tests
        # Skip e2e on Windows: SO_REUSEADDR semantics on Winsock cause one
        # socket to silently capture all loopback traffic, which breaks
        # two-process localhost tests. The protocol works fine across
        # separate hosts.
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            ctest --test-dir build --output-on-failure -E e2e
          else
            ctest --test-dir build --output-on-failure
          fi

  # install.sh is the README's headline install path and only ever runs on
  # user machines, so exercise it here: lint, pin the asset-name contract it
  # shares with release.yml, and round-trip it against a mock release server
  # (including rejecting a tampered download).
  install-script:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint (POSIX sh)
        run: shellcheck -s sh install.sh

      - name: Asset names match release.yml
        run: |
          for n in filecast-linux-x86_64 filecast-linux-arm64 \
                   filecast-macos-universal filecast-windows-x86_64.exe; do
            grep -q -- "$n" install.sh || { echo "install.sh misses $n"; exit 1; }
            grep -q "asset_name: $n" .github/workflows/release.yml \
              || { echo "release.yml misses $n"; exit 1; }
          done

      - name: Mock-release round trip
        run: |
          mkdir -p mock/latest/download
          printf '#!/bin/sh\necho filecast v9.9.9\n' > mock/latest/download/filecast-linux-x86_64
          # Same command the release workflow uses to publish checksums.txt.
          (cd mock/latest/download && sha256sum -- * > checksums.txt)
          python3 -m http.server 8000 --directory mock &
          sleep 1
          FILECAST_DOWNLOAD_BASE=http://127.0.0.1:8000 BIN_DIR="$PWD/bin" sh install.sh
          ./bin/filecast --version | grep -q 9.9.9

      - name: Tampered download is rejected
        run: |
          echo tamper >> mock/latest/download/filecast-linux-x86_64
          if FILECAST_DOWNLOAD_BASE=http://127.0.0.1:8000 BIN_DIR="$PWD/bin2" sh install.sh; then
            echo "tampered download was installed"; exit 1
          fi
          test ! -e bin2/filecast

  # Build with AddressSanitizer + UndefinedBehaviorSanitizer and run the whole
  # suite, so memory errors and UB in the manual buffer handling are caught in CI.
  sanitizers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtest-dev cmake

      - name: Configure (ASan + UBSan)
        run: |
          cmake -S . -B build-asan \
                -DCMAKE_BUILD_TYPE=Debug \
                -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer -g"

      - name: Build
        run: cmake --build build-asan

      - name: Run tests
        env:
          ASAN_OPTIONS: detect_leaks=1:abort_on_error=1
          UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
        run: ctest --test-dir build-asan --output-on-failure
